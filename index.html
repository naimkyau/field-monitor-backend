<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Field Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }
    header h1 { font-size: 1.8rem; color: #4ade80; letter-spacing: 1px; }
    header p  { font-size: 0.85rem; color: #6b7280; margin-top: 4px; }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3142;
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      overflow: hidden;
    }

    .img-wrap {
      width: 100%;
      background: #111318;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
    }
    .img-wrap img {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      display: block;
    }
    .img-wrap .placeholder {
      color: #4b5563;
      font-size: 0.9rem;
    }

    .info { padding: 20px; }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    .badge.healthy  { background: #14532d; color: #4ade80; }
    .badge.diseased { background: #450a0a; color: #f87171; }
    .badge.stressed { background: #431407; color: #fb923c; }
    .badge.unknown  { background: #1e1b4b; color: #a5b4fc; }

    .analysis {
      background: #12151e;
      border: 1px solid #2d3142;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.88rem;
      line-height: 1.75;
      white-space: pre-wrap;
      color: #cbd5e1;
    }

    .meta {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #4b5563;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .waiting {
      text-align: center;
      padding: 48px 20px;
      color: #4b5563;
    }
    .waiting svg { margin-bottom: 12px; opacity: 0.4; }
  </style>
</head>
<body>

<header>
  <h1>🌿 Field Monitor</h1>
  <p>AI-powered crop health • auto-updates every 30s</p>
</header>

<div class="card" id="card">
  <div class="waiting" id="waiting">
    <svg width="48" height="48" fill="none" stroke="#4b5563" stroke-width="1.5" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
    </svg>
    <p>Waiting for first image from ESP32…</p>
  </div>
</div>

<script>
  async function refresh() {
    try {
      const res  = await fetch('/latest');
      const data = await res.json();

      if (!data.url) return;   // no image yet

      const statusRaw = (data.status || '').toLowerCase();
      let badgeClass = 'unknown';
      if (statusRaw.includes('healthy'))  badgeClass = 'healthy';
      else if (statusRaw.includes('disease')) badgeClass = 'diseased';
      else if (statusRaw.includes('stress'))  badgeClass = 'stressed';

      document.getElementById('card').innerHTML = `
        <div class="img-wrap">
          <img src="${data.url}" alt="Field image" />
        </div>
        <div class="info">
          <span class="badge ${badgeClass}">${data.status || 'Unknown'}</span>
          <div class="analysis">${data.analysis || 'No analysis yet.'}</div>
          <div class="meta">
            <span><span class="dot"></span>Live</span>
            <span>Last update: ${data.timestamp || '—'}</span>
          </div>
        </div>`;
    } catch (e) {
      console.error('Fetch error:', e);
    }
  }

  refresh();
  setInterval(refresh, 30000);
</script>
</body>
</html>
